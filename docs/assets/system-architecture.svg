<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Personal CRM system architecture</title>
  <desc id="desc">A visual flowchart showing meeting inputs, calendar and contact context, the agent layer, Feishu confirmation, and the Obsidian vault outputs.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #4b5563; }
      .lane-label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; letter-spacing: .06em; fill: #374151; }
      .card-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .card-text { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #374151; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #4b5563; }
      .badge { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .input { fill: #eff6ff; stroke: #93c5fd; }
      .context { fill: #f0fdf4; stroke: #86efac; }
      .agent { fill: #fff7ed; stroke: #fdba74; }
      .decision { fill: #fdf2f8; stroke: #f9a8d4; }
      .vault { fill: #f5f3ff; stroke: #c4b5fd; }
      .bot { fill: #ecfeff; stroke: #67e8f9; }
      .outline { stroke-width: 1.5; rx: 8; ry: 8; }
      .shadow { filter: drop-shadow(0 8px 18px rgba(15, 23, 42, .09)); }
      .arrow-blue { fill: none; stroke: #2563eb; stroke-width: 2.4; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #059669; stroke-width: 2.4; marker-end: url(#arrow-green); }
      .arrow-amber { fill: none; stroke: #d97706; stroke-width: 2.4; marker-end: url(#arrow-amber); }
      .arrow-muted { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 6; marker-end: url(#arrow-blue); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="820"/>

  <text class="title" x="56" y="56">Personal CRM 系统架构</text>
  <text class="subtitle" x="56" y="84">把录音、转写、日历和联系人线索整理成可检索、可追踪的本地 Obsidian 关系知识库。</text>

  <text class="lane-label" x="72" y="132">DATA SOURCES</text>
  <text class="lane-label" x="392" y="132">AGENT LAYER</text>
  <text class="lane-label" x="720" y="132">CONFIRMATION</text>
  <text class="lane-label" x="956" y="132">OBSIDIAN VAULT</text>

  <g class="shadow">
    <rect class="input outline" x="64" y="154" width="250" height="74"/>
    <text class="card-title" x="88" y="185">飞书妙记</text>
    <text class="card-text" x="88" y="209">线下会议录音 / 转写 / 摘要</text>
  </g>

  <g class="shadow">
    <rect class="input outline" x="64" y="246" width="250" height="74"/>
    <text class="card-title" x="88" y="277">VIAIM / 讯飞听见</text>
    <text class="card-text" x="88" y="301">耳机录音、网页 transcript、音频导出</text>
  </g>

  <g class="shadow">
    <rect class="input outline" x="64" y="338" width="250" height="74"/>
    <text class="card-title" x="88" y="369">手动 transcript</text>
    <text class="card-text" x="88" y="393">粘贴文本、导入文件、临时会议记录</text>
  </g>

  <g class="shadow">
    <rect class="context outline" x="64" y="470" width="250" height="74"/>
    <text class="card-title" x="88" y="501">日历上下文</text>
    <text class="card-text" x="88" y="525">Outlook / Gmail / Google Calendar / ICS</text>
  </g>

  <g class="shadow">
    <rect class="context outline" x="64" y="562" width="250" height="74"/>
    <text class="card-title" x="88" y="593">联系人线索</text>
    <text class="card-text" x="88" y="617">微信导出、已有 CRM、邮件参会人</text>
  </g>

  <g class="shadow">
    <rect class="agent outline" x="388" y="188" width="250" height="86"/>
    <text class="card-title" x="414" y="224">Ingestion Router</text>
    <text class="card-text" x="414" y="248">拉取 / 导入 transcript，写入 inbox</text>
  </g>

  <g class="shadow">
    <rect class="agent outline" x="388" y="324" width="250" height="96"/>
    <text class="card-title" x="414" y="358">Housekeeping Agent</text>
    <text class="card-text" x="414" y="382">匹配日历、联系人、公司和项目线索</text>
    <text class="card-text" x="414" y="404">生成归档任务和待确认问题</text>
  </g>

  <g class="shadow">
    <rect class="agent outline" x="388" y="486" width="250" height="104"/>
    <text class="card-title" x="414" y="522">Codex / Claude Code</text>
    <text class="card-text" x="414" y="546">把 transcript 整理成详细 Markdown notes</text>
    <text class="card-text" x="414" y="568">保留事实、数字、观点、风险和行动项</text>
  </g>

  <g class="shadow">
    <rect class="decision outline" x="714" y="300" width="232" height="132"/>
    <text class="card-title" x="740" y="334">置信度判断</text>
    <text class="card-text" x="740" y="360">高置信度：自动归档</text>
    <text class="card-text" x="740" y="384">低置信度：询问用户</text>
    <text class="card-text" x="740" y="408">禁止误归档和自动合并联系人</text>
  </g>

  <g class="shadow">
    <rect class="bot outline" x="714" y="492" width="232" height="112"/>
    <text class="card-title" x="740" y="528">飞书 Bot</text>
    <text class="card-text" x="740" y="552">卡片选择、自然语言确认</text>
    <text class="card-text" x="740" y="574">知识库问答、归档纠错</text>
  </g>

  <g class="shadow">
    <rect class="vault outline" x="986" y="158" width="254" height="418"/>
    <text class="card-title" x="1014" y="196">Obsidian Vault</text>
    <text class="small" x="1014" y="222">本地 Markdown 知识库</text>

    <rect class="outline" x="1014" y="250" width="204" height="48" fill="#ffffff" stroke="#ddd6fe"/>
    <text class="badge" x="1032" y="280">10_CRM / Contacts</text>

    <rect class="outline" x="1014" y="314" width="204" height="48" fill="#ffffff" stroke="#ddd6fe"/>
    <text class="badge" x="1032" y="344">20_Meetings</text>

    <rect class="outline" x="1014" y="378" width="204" height="48" fill="#ffffff" stroke="#ddd6fe"/>
    <text class="badge" x="1032" y="408">30_Insights</text>

    <rect class="outline" x="1014" y="442" width="204" height="48" fill="#ffffff" stroke="#ddd6fe"/>
    <text class="badge" x="1032" y="472">90_Attachments</text>

    <rect class="outline" x="1014" y="506" width="204" height="48" fill="#ffffff" stroke="#ddd6fe"/>
    <text class="badge" x="1032" y="536">.crm-system</text>
  </g>

  <g class="shadow">
    <rect class="vault outline" x="986" y="628" width="254" height="92"/>
    <text class="card-title" x="1014" y="662">最终产物</text>
    <text class="card-text" x="1014" y="686">联系人档案、会议纪要、洞察复盘</text>
    <text class="card-text" x="1014" y="708">可搜索、可追踪、可持续更新</text>
  </g>

  <path class="arrow-blue" d="M 314 191 C 342 191 354 210 388 224"/>
  <path class="arrow-blue" d="M 314 283 C 342 283 354 248 388 240"/>
  <path class="arrow-blue" d="M 314 375 C 342 375 360 262 388 252"/>

  <path class="arrow-green" d="M 314 507 C 352 507 362 382 388 382"/>
  <path class="arrow-green" d="M 314 599 C 352 599 362 402 388 402"/>

  <path class="arrow-amber" d="M 513 274 L 513 324"/>
  <path class="arrow-amber" d="M 513 420 L 513 486"/>
  <path class="arrow-amber" d="M 638 538 C 674 538 690 420 714 392"/>
  <path class="arrow-green" d="M 946 356 C 964 350 974 328 986 314"/>
  <path class="arrow-green" d="M 946 376 C 964 390 974 402 986 402"/>
  <path class="arrow-amber" d="M 830 432 L 830 492"/>
  <path class="arrow-muted" d="M 714 548 C 650 640 564 640 528 590"/>
  <path class="arrow-blue" d="M 638 538 C 744 626 850 674 986 674"/>

  <text class="small" x="654" y="520">详细 notes</text>
  <text class="small" x="754" y="460">需要确认</text>
  <text class="small" x="952" y="292">自动写入</text>
  <text class="small" x="588" y="646">用户确认后回写</text>

  <rect x="56" y="750" width="1184" height="1" fill="#e5e7eb"/>
  <text class="small" x="56" y="782">原则：本地优先保存；高置信度自动归档；低置信度通过飞书 Bot 确认；联系人合并只生成建议，不自动执行。</text>
</svg>
